<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>sign-up form</title>
</head>

<body>
    <div class="container">
        <div class="image-container">
            <img src="assets/images/illustratoin-desktop.svg" alt="sign-up illustration-desktop">
            <p>SVG made with AI</p>
        </div>
        <div class="form-container">
            <h1>Create An Account</h1>
            <form action="post">    
                <div class="left-side-form">
                    <label for="first-name">First Name <span>*</span></label>
                    <input type="text" id="first-name" placeholder="John">
                    <label for="email">Email <span>*</span></label>
                    <input type="email" id="email" placeholder="john@example.com">
                    <label for="password">Password <span>*</span></label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <div class="right-side-form">
                    <label for="last-name">Last Name <span>*</span></label>
                    <input type="text" id="last-name" placeholder="Doe">
                    <label for="phone-number">Phone Number <span>*</span></label>
                    <input type="tel" id="phone-number" placeholder="+31 6 12345678">
                    <label for="confirm-password">Confirm Password <span>*</span></label>
                    <input type="password" id="confirm-password" placeholder="••••••••">
                </div>
            </form>
            <button>Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </div>
</body>

</html>
